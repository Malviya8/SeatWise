@"
services:
  - type: web
    name: seatwise-api
    runtime: python
    pythonVersion: "3.12"
    buildCommand: pip install -r requirements.txt && python backend/ingest/generate_sample_data.py && python backend/retrieval/vector_store.py --build
    startCommand: uvicorn backend.api.main:app --host 0.0.0.0 --port `$PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        value: ""
      - key: CHROMA_PERSIST_DIR
        value: ./data/embeddings
      - key: CORS_ORIGINS
        value: http://localhost:5173
"@ | Set-Content render.yaml